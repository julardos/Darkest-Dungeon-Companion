# =============================================================================
# Darkest Dungeon Companion — Nginx site config
#
# This is a TEMPLATE. Use setup-nginx.sh to install it automatically, or
# substitute manually and copy to /etc/nginx/sites-available/darkestdungeon.
#
# Placeholders replaced by setup-nginx.sh:
#   __DOMAIN__       → your domain or server IP, e.g. dd.example.com
#   __DEPLOY_PATH__  → absolute repo path, e.g. /home/jules/sites/darkestdungeon
#
# ── PHP-FPM pool user note ────────────────────────────────────────────────────
# By default PHP-FPM runs as www-data. Because the repo lives in ~/sites/ under
# your own user, www-data may not be able to read it. Simplest fix:
#
#   sudo nano /etc/php/8.4/fpm/pool.d/www.conf
#   # Change these two lines to your Linux username:
#   user  = YOUR_USERNAME
#   group = YOUR_USERNAME
#   sudo systemctl restart php8.4-fpm
#
# This is safe on a single-user VPS and avoids all chmod/chown headaches.
#
# Alternative: add www-data to your group and open group read permissions:
#   sudo usermod -aG YOUR_USERNAME www-data
#   chmod g+rX ~ ~/sites ~/sites/darkestdungeon
#   sudo systemctl restart php8.4-fpm
# =============================================================================

upstream dd_fpm {
    # Point this at your PHP-FPM socket.
    # Find yours: sudo find /run /var/run /tmp -name 'php*fpm*.sock' 2>/dev/null
    server unix:/run/php/php8.4-fpm.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        font/woff2 image/svg+xml image/x-icon;

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    # Vite builds the Vue app to frontend/dist/. The SPA handles its own routing
    # client-side, so every non-asset URL must fall back to index.html.
    root  __DEPLOY_PATH__/frontend/dist;
    index index.html;

    # Vite fingerprints asset filenames — cache them forever
    location ~* ^/assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA catch-all
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API — Laravel via PHP-FPM ─────────────────────────────────────
    # The Vue SPA calls /api/* (baseURL: '/api' in frontend/src/api/index.js).
    # We pass every /api/* request directly to Laravel's public/index.php.
    # Laravel reads REQUEST_URI and routes it through routes/api.php.
    location ~ ^/api {
        fastcgi_pass dd_fpm;

        # Always point at Laravel's front controller, not the URI path
        fastcgi_param  SCRIPT_FILENAME  __DEPLOY_PATH__/backend/public/index.php;

        # Required for Laravel routing
        fastcgi_param  REQUEST_URI      $request_uri;
        fastcgi_param  QUERY_STRING     $query_string;
        fastcgi_param  REQUEST_METHOD   $request_method;
        fastcgi_param  CONTENT_TYPE     $content_type;
        fastcgi_param  CONTENT_LENGTH   $content_length;

        # Pass real client IP through to Laravel logs/middleware
        fastcgi_param  REMOTE_ADDR      $remote_addr;
        fastcgi_param  SERVER_NAME      $server_name;
        fastcgi_param  SERVER_PORT      $server_port;
        fastcgi_param  SERVER_PROTOCOL  $server_protocol;
        fastcgi_param  HTTPS            $https if_not_empty;

        include fastcgi_params;

        fastcgi_read_timeout 30;
        fastcgi_buffer_size  16k;
        fastcgi_buffers      4 16k;
    }

    # ── Block access to sensitive files ───────────────────────────────────────
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/darkestdungeon.access.log;
    error_log  /var/log/nginx/darkestdungeon.error.log warn;
}
